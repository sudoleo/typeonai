name: Publish scheduled Consensus

on:
  workflow_dispatch:
    inputs:
      question:
        description: Optional fixed question; leave empty to let the topic model choose
        required: false
        type: string
  schedule:
    - cron: "15 7 * * 2"

concurrency:
  group: scheduled-consensus-publisher
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CONSENSUS_API_BASE_URL: ${{ vars.CONSENSUS_API_BASE_URL || 'https://www.consens.io' }}
      CONSENSUS_API_KEY: ${{ secrets.CONSENSUS_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_TOPIC_MODEL: ${{ vars.OPENAI_TOPIC_MODEL || 'gpt-5.6-luna' }}
      CONSENSUS_QUESTION: ${{ inputs.question }}
      CONSENSUS_IDEMPOTENCY_KEY: scheduled-publisher-${{ github.run_id }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Choose, run and publish Consensus
        run: python scripts/publish_consensus.py
